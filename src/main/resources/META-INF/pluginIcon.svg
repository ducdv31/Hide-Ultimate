<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="40" height="40" rx="8" fill="url(#bgGradient)"/>

    <!-- Eye -->
    <path d="M8 20C10.5 14.5 15 12 20 12C25 12 29.5 14.5 32 20C29.5 25.5 25 28 20 28C15 28 10.5 25.5 8 20Z"
          stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Pupil -->
    <circle cx="20" cy="20" r="4" stroke="white" stroke-width="2.2"/>

    <!-- Slash (Hide effect) -->
    <line x1="11" y1="29" x2="29" y2="11"
          stroke="white" stroke-width="2.4" stroke-linecap="round"/>

    <defs>
        <linearGradient id="bgGradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FF4D8D"/>
            <stop offset="50%" stop-color="#7B61FF"/>
            <stop offset="100%" stop-color="#3C99CC"/>
        </linearGradient>
    </defs>
</svg>